<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position Property</title>
    <link rel="stylesheet" href="PositionProperty.css">
</head>
<body>

    <section>
        <h3>STATIC</h3>
        <div class="first"></div>
        <div class="second" id="static"></div>
    </section>

    <section>
        <h3>RELATIVE</h3>
        <div class="first"></div>
        <div class="second" id="relative"></div>
    </section>

    <section class="parent">
        <h3>ABSOLUTE</h3>
        <div class="first"></div>
        <div class="second" id="absolute"></div>
    </section>

    <section>
        <h3>FIXED</h3>
        <div class="first"></div>
        <div class="second" id="fixed"></div>
    </section>

</body>
</html>
